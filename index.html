<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>ELEVARC 2.0 | Electronics Tech Fest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --electric-blue: #00f0ff;
      --neon-purple: #9d00ff;
      --dark-bg: #0a0e17;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden !important;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark-bg);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 1000;
      background: rgba(10, 14, 23, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.25);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0.75rem;
      max-width: 100%;
      margin: 0 auto;
    }

    .title-font {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      white-space: nowrap;
    }

    .neon-text {
      text-shadow: 0 0 10px var(--electric-blue), 0 0 25px var(--electric-blue), 0 0 50px var(--neon-purple);
    }

    @media (max-width: 640px) {
      .header-inner {
        padding-left: 0.75rem;
        padding-right: 0.5rem;
      }
      h1.text-3xl {
        font-size: 1.75rem;           /* smaller logo on mobile to prevent clipping */
      }
      section, div.max-w-7xl {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }
      .event-card {
        margin-left: 0;
        margin-right: 0;
      }
    }

    .event-card {
      max-width: 100%;
      overflow: hidden;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Your other styles here (hero, countdown, vision, events, etc.) */
    .hero { background: linear-gradient(135deg, #0f172a 0%, #1a0d2e 100%); position: relative; overflow: hidden; }
    .countdown-card { background: rgba(0, 240, 255, 0.08); border: 2px solid var(--electric-blue); box-shadow: 0 0 35px rgba(0, 240, 255, 0.35); backdrop-filter: blur(10px); }
    .vision-mission-text { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 1rem; padding: 2rem; }
    .event-poster-box { height: 260px; background: linear-gradient(45deg, #1e293b, #0f172a); border-bottom: 2px solid var(--electric-blue); }
    .register-btn { background: linear-gradient(90deg, var(--electric-blue), var(--neon-purple)); color: black; font-weight: bold; }
    .register-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--electric-blue); color: white; }

    @media (max-width: 640px) {
      .event-poster-box { height: 200px; }
    }
  </style>
</head>
<body>

<header class="py-3">
  <div class="header-inner">
    <h1 class="text-3xl md:text-4xl font-black title-font neon-text">ELEVARC 2.0</h1>
    <button id="menu-toggle" class="md:hidden text-3xl text-white focus:outline-none">
      <i class="fas fa-bars"></i>
    </button>
    <nav class="hidden md:flex gap-10 text-lg font-medium">
      <a href="#home" class="hover:text-cyan-300">Home</a>
      <a href="#vision" class="hover:text-cyan-300">Vision</a>
      <a href="#mission" class="hover:text-cyan-300">Mission</a>
      <a href="#events" class="hover:text-cyan-300">Events</a>
    </nav>
  </div>

  <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-[#0a0e17]/95 backdrop-blur-lg border-t border-cyan-800/40 py-6 px-4">
    <nav class="flex flex-col gap-5 text-xl font-medium text-center">
      <a href="#home" class="hover:text-cyan-300 py-2">Home</a>
      <a href="#vision" class="hover:text-cyan-300 py-2">Vision</a>
      <a href="#mission" class="hover:text-cyan-300 py-2">Mission</a>
      <a href="#events" class="hover:text-cyan-300 py-2">Events</a>
    </nav>
  </div>
</header>

<div class="pt-20 px-3 md:px-6">

  <!-- Your sections: home, vision, mission, events -->
  <!-- Keep the rest of your content here (hero, countdown, image, vision, mission, events cards, footer) -->

  <!-- Example placeholder for events section start -->
  <section id="events" class="py-16">
    <div class="text-center mb-10">
      <h2 class="text-5xl md:text-6xl font-black title-font neon-text">OUR EVENTS</h2>
    </div>
    <!-- Your event cards go here -->
  </section>

</div>

<footer class="py-10 bg-black text-center text-slate-400 border-t border-cyan-900/40">
  <p>© 2026 DEPARTMENT OF ELECTRONICS ENGINEERING</p>
  <p>SREERAMA GOVERNMENT POLYTECHNIC COLLEGE, THRIPRAYAR</p>
</footer>

<script>
  // Mobile menu toggle
  const menuToggle = document.getElementById('menu-toggle');
  const mobileMenu = document.getElementById('mobile-menu');

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      const icon = menuToggle.querySelector('i');
      icon.classList.toggle('fa-bars');
      icon.classList.toggle('fa-times');
    });
  }

  // Your countdown script here if you still want it
</script>
</body>
</html>
