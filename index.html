<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>ELEVARC 2.0 | Electronics Tech Fest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --electric-blue: #00f0ff;
      --neon-purple: #9d00ff;
      --dark-bg: #0a0e17;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden !important;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark-bg);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 1000;
      background: rgba(10, 14, 23, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.25);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0.75rem;
      max-width: 100%;
    }

    .title-font {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      white-space: nowrap;
    }

    .neon-text {
      text-shadow: 0 0 10px var(--electric-blue), 0 0 25px var(--electric-blue), 0 0 50px var(--neon-purple);
    }

    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1a0d2e 100%);
      position: relative;
      overflow: hidden;
    }

    .countdown-card {
      background: rgba(0, 240, 255, 0.08);
      border: 2px solid var(--electric-blue);
      box-shadow: 0 0 35px rgba(0, 240, 255, 0.35);
      backdrop-filter: blur(10px);
    }

    .vision-mission-text {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 1rem;
      padding: 2rem;
    }

    .event-card {
      background: rgba(0, 240, 255, 0.05);
      border: 1px solid var(--electric-blue);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 240, 255, 0.15);
      backdrop-filter: blur(8px);
      max-width: 100%;
    }

    .event-poster-box {
      height: 260px;
      background: linear-gradient(45deg, #1e293b, #0f172a);
      border-bottom: 2px solid var(--electric-blue);
    }

    .register-btn {
      background: linear-gradient(90deg, var(--electric-blue), var(--neon-purple));
      color: black;
      font-weight: bold;
      transition: all 0.3s;
    }

    .register-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px var(--electric-blue);
      color: white;
    }

    .event-date-highlight {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-weight: bold;
      color: #bbf7d0;
      display: inline-block;
    }

    @media (max-width: 640px) {
      .header-inner {
        padding-left: 0.75rem;
        padding-right: 0.5rem;
      }
      .title-font {
        font-size: 1.75rem;           /* smaller to prevent clipping */
      }
      .pt-24 {
        padding-top: 5rem !important; /* adjusted for smaller header */
      }
      section, .max-w-7xl {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }
      .event-poster-box {
        height: 200px;
      }
    }
  </style>
</head>
<body>

<header class="py-3">
  <div class="header-inner">
    <h1 class="text-3xl md:text-4xl font-black title-font neon-text">ELEVARC 2.0</h1>
    <button id="menu-toggle" class="md:hidden text-3xl text-white focus:outline-none">
      <i class="fas fa-bars"></i>
    </button>

    <nav class="hidden md:flex gap-8 md:gap-12 text-lg font-medium">
      <a href="#home" class="hover:text-cyan-300">Home</a>
      <a href="#vision" class="hover:text-cyan-300">Vision</a>
      <a href="#mission" class="hover:text-cyan-300">Mission</a>
      <a href="#events" class="hover:text-cyan-300">Events</a>
    </nav>
  </div>

  <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-[#0a0e17]/95 backdrop-blur-lg border-t border-cyan-800/40 py-6 px-4">
    <nav class="flex flex-col gap-5 text-xl font-medium text-center">
      <a href="#home" class="hover:text-cyan-300 py-2">Home</a>
      <a href="#vision" class="hover:text-cyan-300 py-2">Vision</a>
      <a href="#mission" class="hover:text-cyan-300 py-2">Mission</a>
      <a href="#events" class="hover:text-cyan-300 py-2">Events</a>
    </nav>
  </div>
</header>

<div class="pt-24 px-3 md:px-6">

  <!-- Hero + Countdown -->
  <section id="home" class="hero min-h-screen flex items-center justify-center py-16">
    <div class="w-full max-w-5xl text-center space-y-12 px-4">
      <h1 class="text-6xl md:text-8xl font-black title-font neon-text">ELEVARC <span class="text-4xl md:text-6xl">2.0</span></h1>
      <p class="text-2xl md:text-3xl text-cyan-300 font-medium">
        DEPARTMENT OF ELECTRONICS ENGINEERING<br>SREERAMA GOVERNMENT POLYTECHNIC COLLEGE, THRIPRAYAR
      </p>
      <div class="mt-12">
        <p class="text-cyan-400 text-xl mb-6">ELEVARC 2.0 BEGINS IN</p>
        <div id="countdown" class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-md mx-auto"></div>
        <p class="mt-8 text-lg text-slate-300">9th & 10th March 2026 • 9:00 AM onwards</p>
      </div>
    </div>
  </section>

  <!-- Add your other sections here (landscape image, vision, mission, events) -->
  <!-- For brevity I'm showing only header + hero part -->
  <!-- Paste your original sections (vision, mission, events cards, footer) below -->

</div>

<script>
  // Mobile menu toggle
  const menuToggle = document.getElementById('menu-toggle');
  const mobileMenu = document.getElementById('mobile-menu');

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      const icon = menuToggle.querySelector('i');
      icon.classList.toggle('fa-bars');
      icon.classList.toggle('fa-times');
    });

    // Close menu when clicking links
    document.querySelectorAll('#mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('hidden');
        const icon = menuToggle.querySelector('i');
        icon.classList.add('fa-bars');
        icon.classList.remove('fa-times');
      });
    });
  }

  // Countdown (your original code)
  function startCountdown() {
    const target = new Date("2026-03-09T09:00:00+05:30").getTime();
    const countdownEl = document.getElementById('countdown');
    function update() {
      const now = new Date().getTime();
      let diff = target - now;
      if (diff <= 0) {
        countdownEl.innerHTML = '<div class="col-span-full text-green-300 p-6 rounded-xl text-3xl font-bold">ELEVARC 2.0 IS LIVE!</div>';
        return;
      }
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);

      countdownEl.innerHTML = `
        <div class="countdown-card p-6 rounded-xl text-center"><div class="text-5xl font-black text-cyan-300">${days}</div><div class="text-sm">DAYS</div></div>
        <div class="countdown-card p-6 rounded-xl text-center"><div class="text-5xl font-black text-cyan-300">${hours}</div><div class="text-sm">HOURS</div></div>
        <div class="countdown-card p-6 rounded-xl text-center"><div class="text-5xl font-black text-cyan-300">${minutes}</div><div class="text-sm">MINUTES</div></div>
        <div class="countdown-card p-6 rounded-xl text-center"><div class="text-5xl font-black text-cyan-300">${seconds}</div><div class="text-sm">SECONDS</div></div>
      `;
    }
    setInterval(update, 1000);
    update();
  }

  window.onload = startCountdown;
</script>
</body>
</html>
