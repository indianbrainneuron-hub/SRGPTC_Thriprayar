<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELEVARC 2.0 | Electronics Tech Fest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --electric-blue: #00f0ff;
      --neon-purple: #9d00ff;
      --dark-bg: #0a0e17;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark-bg);
      color: white;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .title-font {
      font-family: 'Orbitron', sans-serif;
    }

    .neon-text {
      text-shadow: 0 0 10px var(--electric-blue), 0 0 25px var(--electric-blue), 0 0 50px var(--neon-purple);
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
    }

    .countdown-card {
      background: rgba(0, 240, 255, 0.08);
      border: 2px solid var(--electric-blue);           /* restored border */
      box-shadow: 0 0 35px rgba(0, 240, 255, 0.35);
      backdrop-filter: blur(10px);
      border-radius: 1rem;                               /* nicer rounded look */
    }

    @media (max-width: 640px) {
      .header-logo {
        font-size: 1.6rem;                               /* smaller title on mobile */
      }
      .event-poster-box {
        height: 220px;
      }
      .register-btn {
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex justify-between items-center">
      <h1 class="header-logo text-3xl md:text-4xl font-black title-font neon-text">ELEVARC 2.0</h1>

      <button id="menu-toggle" class="md:hidden text-3xl text-white focus:outline-none">
        <i class="fas fa-bars"></i>
      </button>

      <nav class="hidden md:flex gap-8 md:gap-12 text-lg font-medium">
        <a href="#home" class="hover:text-cyan-300">Home</a>
        <a href="#vision" class="hover:text-cyan-300">Vision</a>
        <a href="#mission" class="hover:text-cyan-300">Mission</a>
        <a href="#events" class="hover:text-cyan-300">Events</a>
      </nav>

      <div id="mobile-menu" class="hidden absolute top-full left-0 right-0 bg-[#0a0e17]/95 backdrop-blur-lg border-t border-cyan-900/30 py-6 px-6">
        <nav class="flex flex-col gap-6 text-xl font-medium text-center">
          <a href="#home" class="hover:text-cyan-300 py-2">Home</a>
          <a href="#vision" class="hover:text-cyan-300 py-2">Vision</a>
          <a href="#mission" class="hover:text-cyan-300 py-2">Mission</a>
          <a href="#events" class="hover:text-cyan-300 py-2">Events</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="pt-20 md:pt-24">

    <!-- Hero + Countdown -->
    <section id="home" class="hero min-h-screen flex items-center justify-center py-16 px-4 sm:px-6">
      <div class="max-w-7xl w-full space-y-12 md:space-y-16 text-center">
        <div>
          <h1 class="text-6xl sm:text-7xl md:text-9xl font-black title-font neon-text tracking-wider">
            ELEVARC <span class="text-4xl sm:text-5xl md:text-7xl">2.0</span>
          </h1>
          <p class="mt-6 text-2xl sm:text-3xl md:text-4xl text-cyan-300 font-medium">
            DEPARTMENT OF ELECTRONICS ENGINEERING<br>
            SREERAMA GOVERNMENT POLYTECHNIC COLLEGE, THRIPRAYAR
          </p>
        </div>

        <div class="mt-10 md:mt-12">
          <p class="text-cyan-400 text-xl sm:text-2xl mb-6 md:mb-8 tracking-widest font-medium flex items-center justify-center gap-4">
            <i class="fas fa-bolt text-yellow-400 text-4xl animate-pulse"></i>
            ELEVARC 2.0 BEGINS IN
          </p>
          <div id="countdown" class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6 max-w-4xl mx-auto"></div>
          <p class="mt-8 text-lg sm:text-xl text-slate-300">
            <strong>9th & 10th March 2026</strong> • 9:00 AM onwards
          </p>
        </div>
      </div>
    </section>

    <!-- ... rest of your sections (vision, mission, events, footer) go here ... -->
    <!-- You can paste your original vision / mission / events code below this point -->

  </div>

  <script>
    // Mobile menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    if (menuToggle && mobileMenu) {
      menuToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        const icon = menuToggle.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
      });

      document.querySelectorAll('#mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.add('hidden');
          const icon = menuToggle.querySelector('i');
          icon.classList.add('fa-bars');
          icon.classList.remove('fa-times');
        });
      });
    }

    // Countdown timer
    function startCountdown() {
      const target = new Date("2026-03-09T09:00:00+05:30").getTime();
      const countdownEl = document.getElementById('countdown');

      function update() {
        const now = new Date().getTime();
        let diff = target - now;

        if (diff <= 0) {
          countdownEl.innerHTML = '<div class="col-span-full bg-green-900/40 border border-green-400 text-green-300 p-8 rounded-3xl text-3xl md:text-4xl font-bold title-font text-center">ELEVARC 2.0 IS LIVE NOW!</div>';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        countdownEl.innerHTML = `
          <div class="countdown-card rounded-3xl p-6 md:p-8 text-center">
            <div class="text-5xl md:text-7xl font-black title-font text-cyan-300">${days}</div>
            <div class="text-sm md:text-base mt-2 tracking-widest">DAYS</div>
          </div>
          <div class="countdown-card rounded-3xl p-6 md:p-8 text-center">
            <div class="text-5xl md:text-7xl font-black title-font text-cyan-300">${hours}</div>
            <div class="text-sm md:text-base mt-2 tracking-widest">HOURS</div>
          </div>
          <div class="countdown-card rounded-3xl p-6 md:p-8 text-center">
            <div class="text-5xl md:text-7xl font-black title-font text-cyan-300">${minutes}</div>
            <div class="text-sm md:text-base mt-2 tracking-widest">MINUTES</div>
          </div>
          <div class="countdown-card rounded-3xl p-6 md:p-8 text-center">
            <div class="text-5xl md:text-7xl font-black title-font text-cyan-300">${seconds}</div>
            <div class="text-sm md:text-base mt-2 tracking-widest">SECONDS</div>
          </div>
        `;
      }

      setInterval(update, 1000);
      update();
    }

    window.onload = startCountdown;
  </script>
</body>
</html>
